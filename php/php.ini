; PHP Configuration File for SIFOPI Development
; Generated: 2026-04-21

[PHP]
; Extension directory
extension_dir = "D:\atol\Sifopi-Tugas-ATOL-2014-\php\ext"

; Error handling & reporting
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Session
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Strict

; File uploads
file_uploads = On
upload_max_filesize = 5M
post_max_size = 10M
max_file_uploads = 20

; General
max_execution_time = 300
memory_limit = 256M
default_charset = utf-8

; Timezone
date.timezone = Asia/Jakarta

; Extensions - Database
extension=php_pdo_mysql.dll
extension=php_mysqli.dll
; Note: mysqlnd is built-in, no need to load

; Extensions - Standard (uncomment as needed)
; extension=php_json.dll
; extension=php_filter.dll
; extension=php_hash.dll
; extension=php_openssl.dll
; extension=php_curl.dll
; extension=php_gd.dll
; extension=php_mbstring.dll

[mysqli]
mysqli.default_socket =
mysqli.allow_persistent = On

[PDO]
; PDO configuration
pdo_mysql.default_socket =
